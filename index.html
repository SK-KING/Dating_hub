<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dating Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white">

    <div id="step1" class="p-10 text-center">
        <h1 class="text-2xl font-bold mb-5">Age Enter Karein</h1>
        <input type="number" id="in-age" class="w-full p-3 bg-slate-800 rounded mb-4" placeholder="Age">
        <button onclick="gotoStep2()" class="w-full bg-pink-600 p-3 rounded font-bold">Continue</button>
    </div>

    <div id="step2" class="hidden p-10 text-center">
        <h1 class="text-2xl font-bold mb-5">Name aur Location</h1>
        <input type="text" id="in-name" class="w-full p-3 bg-slate-800 rounded mb-4" placeholder="Name">
        <input type="text" id="in-loc" class="w-full p-3 bg-slate-800 rounded mb-4" placeholder="Location">
        <button onclick="finish()" class="w-full bg-green-600 p-3 rounded font-bold">Start App</button>
    </div>

    <div id="main-app" class="hidden p-5">
        <h1 class="text-xl font-bold text-pink-500">Welcome to Dating Hub!</h1>
        <div id="chat-box" class="h-64 border border-slate-700 mt-4 p-2 overflow-y-auto"></div>
        <input type="text" id="msg" class="w-full p-2 bg-slate-800 mt-2" placeholder="Chat...">
        <button onclick="send()" class="w-full bg-blue-600 mt-2 p-2">Send</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
