<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dating Hub - Welcome</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

    <div id="layout-login" class="fixed inset-0 flex flex-col justify-center items-center p-4 z-50 bg-slate-950">
        <div class="w-full max-w-sm bg-slate-900 p-8 rounded-3xl border border-slate-800 text-center">
            <h1 class="text-3xl font-black mb-6">DATING<span class="text-pink-500">HUB</span></h1>
            <input type="text" id="user-id" placeholder="Username" class="w-full bg-slate-950 p-3 mb-3 rounded-xl border border-slate-700">
            <input type="password" id="user-pass" placeholder="Password" class="w-full bg-slate-950 p-3 mb-6 rounded-xl border border-slate-700">
            <button onclick="handleLogin()" class="w-full bg-pink-500 py-3 rounded-xl font-bold cursor-pointer">Login / Sign Up</button>
        </div>
    </div>

    <div id="layout-profile" class="hidden fixed inset-0 flex flex-col items-center p-6 z-40 bg-slate-950 overflow-y-auto">
        <div class="w-full max-w-sm">
            <h2 class="text-2xl font-bold mb-4">Complete Profile</h2>
            <img id="avatar-preview" src="https://via.placeholder.com/150" class="w-24 h-24 rounded-full mx-auto border-2 border-pink-500 mb-4">
            <input type="text" id="photo-url" placeholder="Paste Photo URL" oninput="updatePreview()" class="w-full bg-slate-900 p-3 mb-3 rounded-xl border border-slate-700">
            <input type="text" id="setup-name" placeholder="Full Name" class="w-full bg-slate-900 p-3 mb-3 rounded-xl border border-slate-700">
            <input type="number" id="setup-age" placeholder="Age" class="w-full bg-slate-900 p-3 mb-3 rounded-xl border border-slate-700">
            <select id="setup-loc" class="w-full bg-slate-900 p-3 mb-3 rounded-xl border border-slate-700">
                <option value="">Select Location</option>
                <option value="Delhi">Delhi</option>
                <option value="Mumbai">Mumbai</option>
                <option value="Patna">Patna</option>
            </select>
            <textarea id="setup-bio" placeholder="Bio..." class="w-full bg-slate-900 p-3 mb-6 rounded-xl border border-slate-700"></textarea>
            <button onclick="finishProfile()" class="w-full bg-emerald-500 py-3 rounded-xl font-bold cursor-pointer">Save & Start</button>
        </div>
    </div>

    <div id="layout-main" class="hidden flex flex-col h-screen">
        <header class="p-4 border-b border-slate-800 text-center font-bold">DATING HUB</header>
        <div id="tab-chat" class="flex-1 p-4 flex flex-col">
            <div id="chat-stream" class="flex-1 overflow-y-auto space-y-3 mb-4 p-4 border border-slate-800 rounded-xl"></div>
            <div class="flex gap-2">
                <input type="text" id="chat-input" class="flex-1 bg-slate-900 p-3 rounded-xl border border-slate-700">
                <button onclick="sendMessage()" class="bg-pink-500 px-6 rounded-xl font-bold cursor-pointer">Send</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
