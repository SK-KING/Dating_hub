<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dating Hub Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

    <div id="screen-onboard" class="fixed inset-0 z-50 bg-slate-950 p-6 flex flex-col justify-center">
        <h1 class="text-3xl font-bold mb-6 text-center">High-quality connections</h1>
        <input type="number" id="in-age" placeholder="Age" class="w-full bg-slate-900 p-4 mb-3 rounded-xl border border-slate-700">
        <button onclick="saveOnboard()" class="w-full bg-emerald-500 py-4 rounded-xl font-bold">Continue</button>
    </div>

    <div id="screen-profile" class="hidden fixed inset-0 z-40 bg-slate-950 p-6 overflow-y-auto">
        <h2 class="text-2xl font-bold mb-4">Complete Profile</h2>
        <input type="text" id="in-name" placeholder="Full Name" class="w-full bg-slate-900 p-4 mb-3 rounded-xl border border-slate-700">
        <select id="in-loc" class="w-full bg-slate-900 p-4 mb-3 rounded-xl border border-slate-700">
            <option>Delhi</option><option>Mumbai</option><option>Patna</option>
        </select>
        <button onclick="finishSetup()" class="w-full bg-emerald-500 py-4 rounded-xl font-bold">Save & Start</button>
    </div>

    <div id="screen-main" class="hidden flex flex-col h-screen">
        <header class="p-4 border-b border-slate-800 text-center font-bold">DATING HUB</header>
        <div id="chat-stream" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
        <div class="p-4 flex gap-2">
            <input type="text" id="chat-input" class="flex-1 bg-slate-900 p-3 rounded-xl border border-slate-700">
            <button onclick="sendMessage()" class="bg-pink-500 px-6 rounded-xl">Send</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
