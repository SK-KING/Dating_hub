<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dating Hub - Find Your Connection</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Smooth scrollbar for chat boxes */
        .chat-stream::-webkit-scrollbar { width: 4px; }
        .chat-stream::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen flex flex-col">

    <header class="bg-slate-900 border-b border-slate-800 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <span class="text-2xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-rose-400">
                    DATING<span class="text-white">HUB</span>
                </span>
            </div>
            <nav id="main-nav" class="flex space-x-6 text-sm font-medium">
                <button onclick="switchTab('discover')" id="nav-discover" class="text-pink-500 border-b-2 border-pink-500 pb-1 focus:outline-none cursor-pointer">Discover</button>
                <button onclick="switchTab('matches')" id="nav-matches" class="text-slate-400 hover:text-white pb-1 focus:outline-none cursor-pointer">Matches (<span id="match-count">0</span>)</button>
            </nav>
        </div>
    </header>

    <main class="flex-1 max-w-md w-full mx-auto p-4 flex flex-col justify-center items-center">
        
        <div id="tab-discover" class="w-full flex flex-col items-center">
            <div class="relative w-full aspect-[3/4] max-w-sm bg-slate-900 rounded-3xl overflow-hidden shadow-2xl border border-slate-800 flex flex-col justify-end">
                <div id="profile-card-content" class="absolute inset-0 flex flex-col justify-end">
                    <img id="profile-img" src="" alt="Profile" class="absolute inset-0 w-full h-full object-cover">
                    <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-slate-950/40 to-transparent"></div>
                    
                    <div class="relative p-6 z-10">
                        <div class="flex items-baseline space-x-2">
                            <h2 id="profile-name" class="text-2xl font-bold text-white"></h2>
                            <span id="profile-age" class="text-xl text-slate-300"></span>
                        </div>
                        <p id="profile-bio" class="text-sm text-slate-300 mt-2 line-clamp-2"></p>
                    </div>
                </div>

                <div id="empty-state" class="hidden absolute inset-0 flex flex-col items-center justify-center p-6 text-center">
                    <div class="w-20 h-20 bg-slate-800 rounded-full flex items-center justify-center mb-4">
                        <span class="text-3xl">✨</span>
                    </div>
                    <h3 class="text-xl font-bold">You've seen everyone!</h3>
                    <p class="text-sm text-slate-400 mt-2">Check back later or refresh to start over.</p>
                    <button onclick="resetProfiles()" class="mt-6 bg-gradient-to-r from-pink-500 to-rose-500 px-6 py-2.5 rounded-full font-semibold shadow-lg hover:opacity-90 transition cursor-pointer">Start Over</button>
                </div>
            </div>

            <div id="action-buttons" class="flex justify-center items-center space-x-6 mt-6">
                <button onclick="handleAction('dislike')" class="w-14 h-14 bg-slate-900 border border-slate-800 rounded-full flex items-center justify-center text-rose-500 shadow-xl hover:scale-110 active:scale-95 transition cursor-pointer">✕</button>
                <button onclick="handleAction('like')" class="w-16 h-16 bg-gradient-to-r from-pink-500 to-rose-500 rounded-full flex items-center justify-center text-white shadow-xl hover:scale-110 active:scale-95 transition cursor-pointer">❤️</button>
            </div>
        </div>

        <div id="tab-matches" class="w-full hidden">
            <h2 class="text-xl font-bold mb-4">Your Connections</h2>
            <div id="matches-grid" class="grid grid-cols-2 gap-4"></div>
            <div id="no-matches" class="text-center py-12 text-slate-500">
                <span class="text-4xl block mb-2">💬</span>
                <p>No matches yet. Keep liking profiles!</p>
            </div>
        </div>

        <div id="tab-chat" class="w-full hidden flex flex-col h-[75vh] max-w-sm bg-slate-900 rounded-3xl border border-slate-800 overflow-hidden shadow-2xl">
            <div class="bg-slate-850 p-4 border-b border-slate-800 flex items-center space-x-3">
                <button onclick="exitChat()" class="text-slate-400 hover:text-white font-bold text-lg pr-2 cursor-pointer">←</button>
                <img id="chat-avatar" src="" class="w-10 h-10 rounded-full object-cover border border-pink-500">
                <div>
                    <h3 id="chat-name" class="font-bold text-sm text-white"></h3>
                    <span id="chat-status" class="text-xs text-emerald-400 flex items-center">Online</span>
                </div>
            </div>

            <div id="chat-stream" class="chat-stream flex-1 p-4 overflow-y-auto space-y-3 flex flex-col">
                </div>

            <div class="p-3 bg-slate-850 border-t border-slate-800 flex space-x-2">
                <input type="text" id="chat-input" placeholder="Type a message..." class="flex-1 bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-pink-500 text-white" onkeypress="if(event.key === 'Enter') sendMessage()">
                <button onclick="sendMessage()" class="bg-pink-500 hover:bg-pink-600 text-white px-4 py-2 rounded-xl font-bold text-sm transition cursor-pointer">Send</button>
            </div>
        </div>

    </main>

    <footer class="text-center py-4 text-xs text-slate-600 border-t border-slate-900">
        &copy; 2026 Dating Hub Concept Prototype.
    </footer>

    <div id="match-toast" class="fixed inset-0 bg-black/80 flex items-center justify-center z-50 hidden transition-opacity duration-300 opacity-0">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-3xl max-w-sm w-full mx-4 text-center shadow-2xl scale-90 transition-transform duration-300" id="toast-card">
            <h3 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-400 to-rose-400 tracking-wide">IT'S A MATCH!</h3>
            <p class="text-slate-300 mt-2 text-sm">You and <span id="matched-name" class="font-bold text-white"></span> liked each other.</p>
            <div class="my-6 flex justify-center"><div class="w-24 h-24 rounded-full border-4 border-pink-500 overflow-hidden shadow-xl"><img id="matched-img" src="" class="w-full h-full object-cover"></div></div>
            <button onclick="closeMatchToast()" class="w-full bg-slate-800 hover:bg-slate-700 text-white font-semibold py-3 rounded-xl transition cursor-pointer">Keep Swiping</button>
        </div>
    </div>

    <script>
        const initialProfiles = [
            { id: 1, name: "Aria", age: 23, bio: "Architectural designer. Love minimalist aesthetics, film photography, and checking out local art cafes.", img: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&q=80&w=600", greeting: "Hey there! Loved your profile. What kind of design or art are you into?" },
            { id: 2, name: "Rohan", age: 25, bio: "UX Researcher & tech enthusiast. Looking for someone to join me for long weekend drives.", img: "https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&q=80&w=600", greeting: "Hey! Down for a virtual cafe debate or street food crawl sometime?" },
            { id: 3, name: "Kabir", age: 24, bio: "Automotive designer. Spend most of my time sketching concepts or working out.", img: "https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?auto=format&fit=crop&q=80&w=600", greeting: "Hey! What's your absolute go-to song when you are driving late at night?" },
            { id: 4, name: "Mira", age: 22, bio: "Literature major who drinks way too much iced coffee. Let's debate books.", img: "https://images.unsplash.com/photo-1524504388940-b1c1722653e1?auto=format&fit=crop&q=80&w=600", greeting: "Hi! Quick icebreaker: What's the last book or movie that completely broke your mind?" }
        ];

        let profiles = [...initialProfiles];
        let currentProfileIndex = 0;
        let matches = [];
        let activeChatUser = null;
        let chatHistories = {}; // Keeps logs of conversations per profile id

        function loadProfile() {
            const content = document.getElementById('profile-card-content');
            const buttons = document.getElementById('action-buttons');
            const emptyState = document.getElementById('empty-state');

            if (currentProfileIndex < profiles.length) {
                const currentProfile = profiles[currentProfileIndex];
                document.getElementById('profile-img').src = currentProfile.img;
                document.getElementById('profile-name').innerText = currentProfile.name + ",";
                document.getElementById('profile-age').innerText = currentProfile.age;
                document.getElementById('profile-bio').innerText = currentProfile.bio;
                content.classList.remove('hidden');
                buttons.classList.remove('opacity-50', 'pointer-events-none');
                emptyState.classList.add('hidden');
            } else {
                content.classList.add('hidden');
                buttons.classList.add('opacity-50', 'pointer-events-none');
                emptyState.classList.remove('hidden');
            }
        }

        function handleAction(action) {
            if (currentProfileIndex >= profiles.length) return;
            const currentProfile = profiles[currentProfileIndex];
            
            if (action === 'like') {
                // High chance to trigger a match simulation
                if (Math.random() > 0.1) { 
                    triggerMatch(currentProfile);
                }
            }
            currentProfileIndex++;
            loadProfile();
        }

        function triggerMatch(profile) {
            matches.push(profile);
            chatHistories[profile.id] = [
                { sender: 'them', text: profile.greeting }
            ];
            document.getElementById('match-count').innerText = matches.length;
            document.getElementById('matched-name').innerText = profile.name;
            document.getElementById('matched-img').src = profile.img;
            
            const toast = document.getElementById('match-toast');
            toast.classList.remove('hidden');
            setTimeout(() => { toast.classList.remove('opacity-0'); }, 50);
            updateMatchesTab();
        }

        function closeMatchToast() {
            const toast = document.getElementById('match-toast');
            toast.classList.add('opacity-0');
            setTimeout(() => { toast.classList.add('hidden'); }, 300);
        }

        function updateMatchesTab() {
            const grid = document.getElementById('matches-grid');
            const noMatches = document.getElementById('no-matches');
            if (matches.length === 0) {
                noMatches.classList.remove('hidden');
                grid.innerHTML = '';
                return;
            }
            noMatches.classList.add('hidden');
            grid.innerHTML = matches.map(match => `
                <div class="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden shadow-md">
                    <img src="${match.img}" class="w-full h-36 object-cover">
                    <div class="p-3">
                        <h4 class="font-bold text-white text-base">${match.name}, <span class="font-normal text-slate-400">${match.age}</span></h4>
                        <button onclick="startChat(${match.id})" class="mt-2 w-full bg-pink-500/10 text-pink-400 border border-pink-500/20 text-xs font-semibold py-1.5 rounded-lg hover:bg-pink-500 hover:text-white transition cursor-pointer">Chat</button>
                    </div>
                </div>
            `).join('');
        }

        /* CHAT LOGIC */
        function startChat(profileId) {
            activeChatUser = matches.find(m => m.id === profileId);
            
            document.getElementById('tab-discover').classList.add('hidden');
            document.getElementById('tab-matches').classList.add('hidden');
            document.getElementById('main-nav').classList.add('hidden'); // Hide top tabs while talking
            
            document.getElementById('tab-chat').classList.remove('hidden');
            document.getElementById('chat-avatar').src = activeChatUser.img;
            document.getElementById('chat-name').innerText = activeChatUser.name;
            
            renderMessages();
        }

        function exitChat() {
            document.getElementById('tab-chat').classList.add('hidden');
            document.getElementById('main-nav').classList.remove('hidden');
            switchTab('matches');
            activeChatUser = null;
        }

        function renderMessages() {
            const stream = document.getElementById('chat-stream');
            const history = chatHistories[activeChatUser.id] || [];
            
            stream.innerHTML = history.map(msg => {
                if (msg.sender === 'me') {
                    return `<div class="self-end bg-pink-500 text-white max-w-[75%] px-3.5 py-2 rounded-2xl rounded-tr-none text-sm shadow-md">${msg.text}</div>`;
                } else {
                    return `<div class="self-start bg-slate-800 text-slate-100 max-w-[75%] px-3.5 py-2 rounded-2xl rounded-tl-none text-sm border border-slate-700/50 shadow-md">${msg.text}</div>`;
                }
            }).join('');
            
            stream.scrollTop = stream.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;

            // Push User Message
            chatHistories[activeChatUser.id].push({ sender: 'me', text: text });
            input.value = '';
            renderMessages();

            // Simulate automatic interactive reply
            document.getElementById('chat-status').innerText = "typing...";
            document.getElementById('chat-status').className = "text-xs text-pink-400 italic animate-pulse";
            
            setTimeout(() => {
                if (!activeChatUser) return;
                const dynamicReplies = [
                    "Haha wow, that is actually super interesting! Tell me more?",
                    "Honestly, I absolute agree with you on that one. 💯",
                    "Ooh fancy! You sound like someone who knows exactly what they like. Let's hang out soon?",
                    "That sounds incredible. I'm usually free this coming weekend if you want to grab coffee!"
                ];
                const randomReply = dynamicReplies[Math.floor(Math.random() * dynamicReplies.length)];
                
                chatHistories[activeChatUser.id].push({ sender: 'them', text: randomReply });
                document.getElementById('chat-status').innerText = "Online";
                document.getElementById('chat-status').className = "text-xs text-emerald-400";
                renderMessages();
            }, 1500);
        }

        function switchTab(tabName) {
            const discoverTab = document.getElementById('tab-discover');
            const matchesTab = document.getElementById('tab-matches');
            const navDiscover = document.getElementById('nav-discover');
            const navMatches = document.getElementById('nav-matches');

            if (tabName === 'discover') {
                discoverTab.classList.remove('hidden');
                matchesTab.classList.add('hidden');
                navDiscover.className = "text-pink-500 border-b-2 border-pink-500 pb-1 focus:outline-none cursor-pointer";
                navMatches.className = "text-slate-400 hover:text-white pb-1 focus:outline-none cursor-pointer";
            } else {
                discoverTab.classList.add('hidden');
                matchesTab.classList.remove('hidden');
                navDiscover.className = "text-slate-400 hover:text-white pb-1 focus:outline-none cursor-pointer";
                navMatches.className = "text-pink-500 border-b-2 border-pink-500 pb-1 focus:outline-none cursor-pointer";
            }
        }

        function resetProfiles() {
            currentProfileIndex = 0;
            loadProfile();
        }

        window.onload = () => {
            loadProfile();
            updateMatchesTab();
        };
    </script>
</body>
</html>
